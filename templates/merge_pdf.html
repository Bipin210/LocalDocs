<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - PDF Tools</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-file-pdf"></i>
                <span>PDF Tools</span>
            </div>
        </div>
    </nav>

    <div class="tool-page">
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="page-header">
            <h1>Merge PDF Files</h1>
            <p>Combine multiple PDF documents into one file</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Select PDF files</h3>
            <p>Click to browse or drag and drop files here</p>
            <input type="file" id="fileInput" accept=".pdf" multiple>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                Choose Files
            </button>
        </div>

        <div class="file-list" id="fileList"></div>

        <div class="error" id="error"></div>

        <button class="btn btn-primary process-btn" id="processBtn" style="display: none;">
            <i class="fas fa-object-group"></i> Merge PDFs
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Merging your PDFs...</p>
        </div>

        <div class="result" id="result">
            <i class="fas fa-check-circle"></i>
            <h3>Success!</h3>
            <p>Your PDFs have been merged successfully.</p>
            <a href="#" id="downloadBtn" class="btn btn-success" style="margin-top: 1rem;">
                <i class="fas fa-download"></i> Download Merged PDF
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/merge.js') }}"></script>
</body>
</html>
